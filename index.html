<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Natural Beauty Cosmetics</title>
    <!-- Google Fonts & FontAwesome Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #8a7355;
            --primary-light: #b5a28c;
            --dark: #22201d;
            --light: #faf8f5;
            --accent: #dcae1d;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--light);
            color: var(--dark);
            overflow-x: hidden;
        }

        /* --- Animations --- */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes glow {
            0% { box-shadow: 0 5px 15px rgba(138, 115, 85, 0.2); }
            50% { box-shadow: 0 5px 25px rgba(220, 174, 29, 0.4); }
            100% { box-shadow: 0 5px 15px rgba(138, 115, 85, 0.2); }
        }

        /* --- Header / Hero --- */
        header {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            /* Placeholder comment: You can swap WEBVF.jfif out for any image name below */
            background: linear-gradient(rgba(255, 255, 255, 0.85), rgba(255, 255, 255, 0.95)), url('WEBVF.jfif') center/cover no-repeat;
            color: var(--dark);
            padding: 40px 20px;
        }

        .brand-logo {
            width: 180px;
            height: 180px;
            object-fit: contain;
            margin-bottom: 20px;
            animation: fadeInDown 1.2s ease-out forwards;
            border-radius: 50%;
        }

        header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            margin-bottom: 15px;
            color: var(--primary);
            animation: fadeInDown 1.2s ease-out forwards;
            letter-spacing: 2px;
        }

        header p {
            font-size: 1.2rem;
            margin-bottom: 40px;
            max-width: 600px;
            animation: fadeInUp 1.2s ease-out forwards;
            color: #555;
            line-height: 1.6;
        }

        /* --- CTA Links --- */
        .social-links {
            display: flex;
            gap: 20px;
            animation: fadeInUp 1.5s ease-out forwards;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn-social {
            padding: 14px 35px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 0.4s ease;
            color: #fff;
            font-size: 1rem;
        }

        .btn-tiktok {
            background: #000000;
            border: 2px solid #fe2c55;
        }
        .btn-tiktok:hover {
            box-shadow: 0 0 15px rgba(254, 44, 85, 0.6);
            transform: scale(1.05);
        }

        .btn-whatsapp {
            background: #25D366;
            border: 2px solid #20ba5a;
        }
        .btn-whatsapp:hover {
            box-shadow: 0 0 15px rgba(37, 211, 102, 0.6);
            transform: scale(1.05);
        }

        /* --- Main Collection Catalog Grid --- */
        .catalog-container {
            max-width: 1200px;
            margin: 80px auto;
            padding: 0 20px;
        }

        .section-title {
            text-align: center;
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            margin-bottom: 60px;
            position: relative;
            color: var(--primary);
        }

        .section-title::after {
            content: '';
            width: 80px;
            height: 3px;
            background: var(--accent);
            position: absolute;
            bottom: -15px;
            left: 50%;
            transform: translateX(-50%);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
        }

        /* --- Scroll Animation Classes --- */
        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        /* --- Product Card --- */
        .card {
            background: #fff;
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid rgba(138, 115, 85, 0.1);
            animation: glow 4s infinite ease-in-out;
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-10px);
        }

        .img-container {
            height: 380px;
            overflow: hidden;
            position: relative;
            background-color: #f7f5f2;
        }

        .img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .card:hover .img-container img {
            transform: scale(1.08);
        }

        /* --- Footer --- */
        footer {
            background: var(--dark);
            color: #fff;
            text-align: center;
            padding: 40px 20px;
            margin-top: 100px;
        }

        footer p {
            font-size: 0.9rem;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <!-- Hero Header Section -->
    <header>
        <!-- Logo Display Image Slot -->
        <img src="WB.jfif" alt="Natural Beauty" class="brand-logo">
        <h1>Natural Beauty</h1>
        <p>Premium, 100% organic skincare and hair remedies meticulously crafted to let your natural glow radiate beautifully.</p>
        
        <!-- Social Contact Group -->
        <div class="social-links">
            <a href="https://www.tiktok.com/@naturalbeauty1990" target="_blank" class="btn-social btn-tiktok">

            </a>
            <a href="https://wa.me/YOUR_PHONE_NUMBER" target="_blank" class="btn-social btn-whatsapp">

        </div>
    </header>

    <!-- Main Collection Catalog Grid -->
    <main class="catalog-container">
        <h2 class="section-title">Our Pure Collection</h2>
        
        <div class="grid">
            <!-- Product Card 1 -->
            <div class="card reveal">

            </div>

            <!-- Product Card 2 -->

            </div>

            <!-- Product Card 3 -->
            <div class="card reveal">

                    <img src="WBJPG.jfif" alt="Natural Beauty Collection">
                </div>
            </div>

            <!-- Product Card 4 -->
            <div class="card reveal">
                <div class="img-container">
                    <img src="WBTR.jfif" alt="Natural Beauty Collection">
                </div>
            </div>

            <!-- Product Card 5 -->
            <div class="card reveal">
                <div class="img-container">
                    <img src="WBV.jfif" alt="Natural Beauty Collection">
                </div>
            </div>

            <!-- Product Card 6 -->
            <div class="card reveal">
                <div class="img-container">
                    <img src="WBVC.jfif" alt="Natural Beauty Collection">
                </div>
            </div>

            <!-- Product Card 7 -->
            <div class="card reveal">
                <div class="img-container">
                    <img src="WEBVF.jfif" alt="Natural Beauty Collection">

            </div>

            <!-- Product Card 8 -->
            <div class="card reveal">
                <div class="img-container">
                    <img src="wbn.jfif" alt="Natural Beauty Collection">
                </div>
            </div>

            <!-- Product Card 9 -->
            <div class="card reveal">
                <div class="img-container">
                    <img src="wbnm.jfif" alt="Natural Beauty Collection">

            </div>

            <!-- Product Card 10 -->
            <div class="card reveal">
                <div class="img-container">
                    <img src="wbnmk.jfif" alt="Natural Beauty Collection">

            </div>

            <!-- Product Card 11 -->

                    <img src="wnhj.jfif" alt="Natural Beauty Collection">

        </div>
    </main>

    <footer>
        <p>&copy; 2026 Natural Beauty Cosmetics. Handcrafted Organic Wellness.</p>
    </footer>

    <!-- Interactive On-Scroll Reveal Script -->
    <script>
        function revealElements() {
            var reveals = document.querySelectorAll(".reveal");
            var windowHeight = window.innerHeight;
            for (var i = 0; i < reveals.length; i++) {
                var elementTop = reveals[i].getBoundingClientRect().top;
                var elementVisible = 50;
                if (elementTop < windowHeight - elementVisible) {
                    reveals[i].classList.add("active");
                }
            }
        }
        window.addEventListener("scroll", revealElements);
        window.addEventListener("DOMContentLoaded", revealElements);
        setTimeout(revealElements, 150);
    </script>
</body>
</html>
